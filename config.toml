baseurl = "/"
languageCode = "en-us"
theme = "hello-friend-ng"
title = "juanmarcadena"

[params]
  
  homeSubtitle    = ""
  dateform        = "Jan 2, 2006"
  dateformShort   = "Jan 2"
  dateformNum     = "2006-01-02"
  dateformNumTime = "2006-01-02 15:04 -0700"
  mainSections = ["posts", "music"]
  # Set disableReadOtherPosts to true in order to hide the links to other posts.
  disableReadOtherPosts = false
  
  # Metadata mostly used in document's head
  description = "My new homepage or blog"
  keywords = "homepage, blog"
  images = [""]
  [[params.social]]
    name = "twitter"
    url = "https://twitter.com/juanmarcadena"
  [[params.social]]
    name = "instagram"
    url = "https://www.instagram.com/juanmarcadena/"
  [[params.social]]
    name = "tiktok"
    url = "https://www.tiktok.com/@juanmarcadena"
  [[params.social]]
    name = "github"
    url = "https://github.com/juanmarcadena"
  [[params.social]]
    name = "rss"
    url = ""


  [params.favicon.color]
    mask = "black"

  # Directory name of your blog content (default is `content/posts`)
  contentTypeName = "content/"

  # Default theme "light" or "dark"
  defaultTheme = "light"
  
[sitemap]
  changefreq = "always"
  priority = 0.5
  filename = "sitemap.xml"

[author]
  name = "juanmarcadena"

[languages.en]
    subtitle = ""
    keywords = ""
    #copyright = "© 2015 Jane Doe.  <a href=\"https://creativecommons.org/licenses/by/4.0/\">Some rights reserved</a>."
    readOtherPosts = "Read other posts"

    [languages.en.params.logo]
      
      logoText = "Y H L Q M D L G"
      logoHomeLink = "/"
    # or
    #
    # path = "/img/your-example-logo.svg"
    # alt = "Your example logo alt text"

  # And you can even create generic menu
  [[menu.main]]
    identifier = "post"
    name       = "posts"
    url        = "posts/academia"
  [[menu.main]]
    identifier = "music"
    name       = "music"
    url        = "/music"
  [[menu.main]]
    identifier = "me"
    name       = "me"
    url        = "posts/me"  
    
  

